# application-local.properties
spring.config.import=optional:file:C:/opt/gdrsheet/config/database.properties,optional:file:C:/opt/gdrsheet/config/taiga.properties
# driver e ddl
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

spring.jackson.serialization.fail-on-empty-beans=false

# Import bulk da file (es. talenti da JSONL): il default di Spring Boot (1MB/10MB) è troppo basso
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# JWT (sovrascrivere il secret in produzione, min 32 byte)
app.jwt.secret=${APP_JWT_SECRET:dnd-gdrsheet-dev-secret-key-change-me-in-prod-0123456789}
app.jwt.validity-hours=${APP_JWT_VALIDITY_HOURS:168}
# Taiga (integrazione segnalazioni): le credenziali NON stanno qui, ma in un file esterno
# (stessa cartella/pattern del DB, vedi TaigaClient.java @PropertySource):
#   C:/opt/gdrsheet/config/taiga.properties  (dev)
#   /opt/gdrsheet/config/taiga.properties    (prod)
# con le chiavi: app.taiga.base-url, app.taiga.project-slug, app.taiga.bot-username, app.taiga.bot-password
#spring.devtools.restart.enabled=false
#spring.devtools.livereload.enabled=false

# Il logging delle query (datasource-proxy + tracer dello stack) è COSTOSO per richiesta
# ed è attivo SOLO col profilo "dev" (vedi application-dev.properties). In produzione resta spento.
decorator.datasource.enabled=false
