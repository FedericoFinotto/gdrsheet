# driver e ddl
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

spring.jackson.serialization.fail-on-empty-beans=false

# JWT (sovrascrivere il secret in produzione, min 32 byte)
app.jwt.secret=${APP_JWT_SECRET:dnd-gdrsheet-dev-secret-key-change-me-in-prod-0123456789}
app.jwt.validity-hours=${APP_JWT_VALIDITY_HOURS:168}

#spring.devtools.restart.enabled=false
#spring.devtools.livereload.enabled=false

# Il logging delle query (datasource-proxy + tracer dello stack) è COSTOSO per richiesta
# ed è attivo SOLO col profilo "dev" (vedi application-dev.properties). In produzione resta spento.
decorator.datasource.enabled=false
